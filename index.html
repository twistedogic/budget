<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget SLO Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="/budget/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── Custom Properties ──────────────────────────────── */
    :root {
      --bg:             #0f1117;
      --card-bg:        #1a1d27;
      --card-border:    #2a2d3a;
      --accent:         #f59e0b;
      --positive:       #22c55e;
      --negative:       #ef4444;
      --info:           #60a5fa;
      --text-primary:   #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted:     #475569;
      --font-sans:      'Geist', ui-sans-serif, system-ui, sans-serif;
      --font-mono:      'Geist Mono', ui-monospace, 'Cascadia Code', monospace;
    }

    /* ─── Base ───────────────────────────────────────────── */
    html { font-size: 16px; -webkit-font-smoothing: antialiased; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font-sans);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ─── Layout ─────────────────────────────────────────── */
    #app {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }

    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .app-title {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--accent), #fb923c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .app-subtitle {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-top: 4px;
    }

    .mt-section { margin-top: 24px; }
    .mt-cards   { margin-top: 16px; }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 640px) {
      .grid-2 { grid-template-columns: 1fr; }
      .app-title { font-size: 1.3rem; }
    }

    /* ─── Cards ──────────────────────────────────────────── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 20px;
      transition: border-color 0.2s ease;
      position: relative;
    }

    .card:hover   { border-color: #f59e0b30; }
    .card-wide    { grid-column: span 1; }
    .card-full    { grid-column: 1 / -1; }
    .card-center  { display: flex; flex-direction: column; align-items: center; text-align: center; }

    .card-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .card-value {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-variant-numeric: tabular-nums;
    }

    .card-value-lg { font-size: 2rem; }

    .card-sub {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .positive { color: var(--positive) !important; }
    .warning  { color: var(--accent) !important; }
    .negative { color: var(--negative) !important; }
    .text-muted     { color: var(--text-muted); }
    .text-secondary { color: var(--text-secondary); }
    .mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }

    /* ─── Alert Banner ───────────────────────────────────── */
    .alert-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      font-weight: 500;
      gap: 12px;
    }

    .alert-warning {
      background: #f59e0b18;
      border: 1px solid #f59e0b55;
      color: var(--accent);
    }

    .alert-incident {
      background: #ef444418;
      border: 1px solid #ef444455;
      color: var(--negative);
      box-shadow: 0 0 20px #ef444420;
      animation: pulse-red 2s ease-in-out infinite;
    }

    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 0 10px #ef444420; }
      50%       { box-shadow: 0 0 24px #ef444450; }
    }

    .alert-text  { flex: 1; }
    .alert-dismiss {
      background: none;
      border: none;
      color: inherit;
      cursor: pointer;
      font-size: 1rem;
      opacity: 0.7;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .alert-dismiss:hover { opacity: 1; background: rgba(255,255,255,0.1); }

    /* ─── Budget Card ────────────────────────────────────── */
    .budget-display { display: flex; align-items: center; gap: 10px; }
    .budget-edit    { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    .budget-input {
      background: var(--bg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 1rem;
      padding: 6px 12px;
      width: 160px;
      outline: none;
      transition: border-color 0.2s;
    }
    .budget-input:focus { border-color: var(--accent); }

    /* ─── Remaining Card ─────────────────────────────────── */
    .remaining-row { display: flex; align-items: center; gap: 12px; }

    .trend-up   { font-size: 1.4rem; color: var(--positive); font-weight: 700; }
    .trend-down { font-size: 1.4rem; color: var(--negative); font-weight: 700; }
    .trend-flat { font-size: 1.4rem; color: var(--accent);   font-weight: 700; }

    /* ─── Sparkline ──────────────────────────────────────── */
    .sparkline {
      display: block;
      width: 100%;
      height: 48px;
      margin-top: 12px;
      border-radius: 4px;
    }
    .sparkline-sm {
      width: 80px;
      height: 24px;
      margin: 0;
    }

    /* ─── Burn Rate ──────────────────────────────────────── */
    .burn-row { display: flex; align-items: center; gap: 10px; }
    .burn-icon { font-size: 1.4rem; }

    /* ─── SLO Meter ──────────────────────────────────────── */
    .slo-meter-wrap { margin: 8px 0; }

    /* ─── Error Budget Bar ───────────────────────────────── */
    .error-budget-bar-wrap { margin: 10px 0 8px; }

    .error-budget-track {
      background: #2a2d3a;
      border-radius: 6px;
      height: 14px;
      position: relative;
      overflow: hidden;
    }

    .error-budget-fill {
      height: 100%;
      border-radius: 6px;
      transition: width 0.4s ease;
    }

    .threshold-marker {
      position: absolute;
      top: 0;
      width: 2px;
      height: 100%;
      background: var(--bg);
      opacity: 0.5;
    }

    .error-budget-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      font-size: 0.85rem;
    }

    /* ─── Category Sparklines ────────────────────────────── */
    .category-list { display: flex; flex-direction: column; gap: 10px; }

    .category-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .category-info {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 130px;
      flex-shrink: 0;
    }

    .category-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .category-name {
      font-size: 0.82rem;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .category-amount {
      font-size: 0.85rem;
      color: var(--text-primary);
      margin-left: auto;
      white-space: nowrap;
    }

    /* ─── Expense Log ────────────────────────────────────── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .log-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    .expense-list { display: flex; flex-direction: column; gap: 6px; max-height: 420px; overflow-y: auto; }
    .expense-list::-webkit-scrollbar { width: 4px; }
    .expense-list::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 2px; }

    .expense-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      background: #0f1117;
      border: 1px solid var(--card-border);
      border-radius: 8px;
      font-size: 0.83rem;
      transition: border-color 0.15s;
      flex-wrap: wrap;
    }
    .expense-row:hover { border-color: #3a3d4a; }

    .expense-date   { color: var(--text-muted); white-space: nowrap; min-width: 54px; }
    .expense-note   { flex: 1; color: var(--text-secondary); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .expense-amount { color: var(--text-primary); font-family: var(--font-mono); white-space: nowrap; }

    .empty-state {
      padding: 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* ─── Badges ─────────────────────────────────────────── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 0.7rem;
      font-weight: 600;
      white-space: nowrap;
      letter-spacing: 0.02em;
    }

    /* ─── Buttons ────────────────────────────────────────── */
    button { cursor: pointer; font-family: inherit; }

    .btn-primary {
      background: var(--accent);
      color: #0f1117;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.85rem;
      padding: 8px 16px;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.88; }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      font-size: 0.85rem;
      padding: 8px 14px;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-ghost:hover { border-color: var(--text-secondary); color: var(--text-primary); }

    .btn-sm { padding: 5px 12px !important; font-size: 0.78rem !important; }

    .icon-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 0.9rem;
      padding: 3px 6px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }
    .icon-btn:hover  { color: var(--text-primary); background: rgba(255,255,255,0.07); }
    .edit-btn:hover  { color: var(--accent); }
    .delete-btn:hover { color: var(--negative); }

    /* ─── Inputs / Selects ───────────────────────────────── */
    .input, .select-sm {
      background: var(--bg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.9rem;
      padding: 8px 12px;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    .input:focus, .select-sm:focus { border-color: var(--accent); }

    .select-sm {
      width: auto;
      padding: 5px 10px;
      font-size: 0.78rem;
    }

    /* ─── Modal ──────────────────────────────────────────── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
      backdrop-filter: blur(2px);
    }

    .modal-box {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 24px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
      animation: modal-in 0.2s ease;
    }

    @keyframes modal-in {
      from { opacity: 0; transform: translateY(10px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .modal-header h2 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 20px;
    }

    .form-group { margin-bottom: 14px; }

    .form-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-error {
      color: var(--negative);
      font-size: 0.8rem;
      margin-top: -8px;
      margin-bottom: 10px;
      padding: 8px 10px;
      background: #ef444415;
      border-radius: 6px;
      border: 1px solid #ef444430;
    }

    /* ─── Utilities ──────────────────────────────────────── */
    .hidden { display: none !important; }

    /* ─── Scrollbar (global) ─────────────────────────────── */
    ::-webkit-scrollbar       { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #2a2d3a; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a3d4a; }
  </style>
